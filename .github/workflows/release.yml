name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'config.json'
  watch:
    types: [started]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate override files
        run: node generate.js

      - name: Delete existing latest tag and release
        continue-on-error: true
        run: |
          git fetch --tags
          if git show-ref --tags | grep -q refs/tags/latest; then
            git tag -d latest
            git push origin :refs/tags/latest
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: |
            自动生成的 Clash 覆写文件（最新版）
            
            > 每次推送后自动更新
          files: |
            override.js
            override.yaml
          draft: false
          prerelease: false
